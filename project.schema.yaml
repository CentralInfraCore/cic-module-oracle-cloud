---
type: object
title: "Project Definition Schema"
description: "Defines the structure for the project's main descriptor and configuration file (project.yaml)."
required:
  - metadata
  - compiler_settings
  - abi
additionalProperties: false
properties:
  metadata:
    type: object
    description: "General metadata about the repository."
    required:
      - name
      - description
      - license
      - owner
      - main_branch
    additionalProperties: false
    properties:
      name:
        type: string
        description: "The human-readable name of the repository."
      description:
        type: string
        description: "A one-sentence summary of the repository's purpose."
      version:
        type: [string, "null"]
        description: "The semantic version of the repository's codebase."
        pattern: >-
          ^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-((?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*)(?:\.(?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*))*))?(?:\+([0-9a-zA-Z-]+(?:\.[0-9a-zA-Z-]+)*))?$
      license:
        type: string
        description: >-
          The SPDX identifier for the repository's license (e.g., 'MIT',
          'CC-BY-NC-SA-4.0').
      main_branch:
        type: string
        description: >-
          The prefix used for release branches and tags (e.g., 'main' or
          'schemas').
      owner:
        type: string
        description: >-
          The team or individual responsible for the repository.
      tags:
        type: array
        description: "A list of tags for categorization and discovery."
        items:
          type: string
      validatedBy:
        type: object
        description: >-
          A receipt proving which meta-schema was used for validation. A
          template/unreleased project.yaml carries 'TBD' placeholders here —
          see project.yaml's metadata comments.
        required:
          - name
          - version
        additionalProperties: false
        properties:
          name:
            type: string
          version:
            type: string
          checksum:
            type: string
            description: "SHA256 checksum of the validating meta-schema's spec block, or 'TBD'."
      createdBy:
        type: object
        description: >-
          Author identity + Vault-issued certificate chain. Template
          placeholders ('TBD') are filled by the release process
          (tools/infra.py: _resign_with_build_hash and the Vault signing
          chain) — see project.yaml's metadata comments.
        required:
          - name
          - email
          - certificate
          - issuer_certificate
        additionalProperties: false
        properties:
          name:
            type: string
          email:
            type: string
          certificate:
            type: string
          issuer_certificate:
            type: string
      build_timestamp:
        type: string
        description: >-
          Timestamp when this version was built and signed, or 'TBD' in a
          template/unreleased project.yaml.
      validity:
        type: object
        description: "Support lifecycle window, or 'TBD'/'TBD' in a template/unreleased project.yaml."
        required:
          - from
          - until
        additionalProperties: false
        properties:
          from:
            type: string
          until:
            type: string
      checksum:
        type: string
        description: "Checksum of the source-spec, or 'TBD' in a template/unreleased project.yaml."
      sign:
        type: string
        description: "Vault signature over metadata (incl. buildHash), or 'TBD' in a template/unreleased project.yaml."
      buildHash:
        type: string
        description: >-
          sha256(module/module.wasm), written by `make wasm.build` /
          `wasm.buildhash` (mk/wasm.mk). Empty in a freshly-generated
          template before the first build.
        pattern: '^([a-f0-9]{64}|TBD)?$'
      cicSign:
        type: string
        description: "CIC Root CA co-signature, or 'TBD' in a template/unreleased project.yaml."
      cicSignedCA:
        type: object
        description: "CIC Root CA certificate, or 'TBD' in a template/unreleased project.yaml."
        required:
          - certificate
        additionalProperties: false
        properties:
          certificate:
            type: string
      maintenance:
        type: object
        description: >-
          Defines the maintenance status and support window for this version
          of the repository.
        properties:
          status:
            type: string
            description: "The current maintenance status."
            enum: ["active", "maintenance-only", "deprecated", "end-of-life"]
          supported_until:
            type: string
            description: >-
              The date (YYYY-MM-DD) until which this version receives support
              or updates.
            format: date

      contacts:
        type: array
        description: "Points of contact for support or questions."
        items:
          type: object
          required:
            - type
            - value
          properties:
            type:
              type: string
              enum: ["email", "slack", "msteams"]
            value:
              type: string
      links:
        type: array
        description: "Important URLs related to the repository."
        items:
          type: object
          required: ["name", "url"]
          properties:
            name:
              type: string
            url:
              type: string

  compiler_settings:
    type: object
    description: "Configuration for the build and release tools."
    required:
      - repo_type
      - meta_schemas_dir
      - source_dir
      - meta_schema_file
      - vault_key_name
    additionalProperties: false
    properties:
      repo_type:
        type: string
        description: "The type of repository. Controls which compiler commands are available."
        enum: ["schema", "workflow", "module"]
      component_name:
        type: string
        description: "Release component name (tools/infra.py: _check_base_branch_and_version)."
      main_branch:
        type: string
        description: "The target branch for merge-back after release."
      meta_schemas_dir:
        type: string
      meta_schema_file:
        type: string
      canonical_source_file:
        type: string
        description: "The canonical source schema validated by `make validate` (tools/infra.py: run_validation)."
      dependencies_dir:
        type: string
        description: "Directory for validator schemas (schema repos only)."
      release_dir:
        type: string
        description: "Output directory for released schemas (schema repos only)."
      vault_key_name:
        type: string
        description: "The Vault key name for the author's signature."
      cic_root_ca_key_name:
        type: string
        description: "The Vault key name for the CIC Root CA co-signature."
      source_dir:
        type: string
      vault_cert_mount:
        type: string
        description: "Vault mount point for the author's certificate (tools/infra.py: vault_service.get_certificate)."
      vault_cert_secret_name:
        type: string
        description: "Vault secret name for the author's certificate."
      vault_cert_secret_key:
        type: string
        description: "Vault secret key for the author's/CIC Root CA certificate."
      cic_root_ca_secret_name:
        type: string
        description: "Secret name in Vault KV for the CIC Root CA certificate."
      validity_days:
        type: integer
        description: "How many days a release artifact remains valid."

  abi:
    $ref: "abi.schema.yaml"

  capability_manifest:
    $ref: "capability-manifest.schema.yaml"

  release:
    type: object
    description: >-
      Contains the cryptographic proof for a given release version.
      This block is populated by the CI/CD pipeline.
    properties:
      version:
        type: string
        description: "The semantic version of this release."
      timestamp:
        type: string
        format: date-time
        description: >-
          The exact timestamp when this release was built and signed.
      repository_tree_hash:
        type: string
        description: >-
          The Git tree hash of the entire repository at the moment of release,
          proving the integrity of the full codebase.
      digest:
        type: string
        description: "The base64 encoded SHA256 digest of the repository tree hash used for signing."
      signing_metadata:
        type: array
        description: "A list of cryptographic signatures."
        minItems: 2
        maxItems: 2
        items:
          type: object
          required:
            - type
            - key
            - signature
            - hash_algorithm
          properties:
            type:
              type: string
              description: "The type of signature."
              enum: ["author", "approval"]
            key:
              type: string
              description: "The name of the key used for signing in Vault."
            signature:
              type: string
              description: "The Vault-provided signature string."
            hash_algorithm:
              type: string
              description: "The hashing algorithm used before signing."
              enum: ["sha256"]
    required:
      - version
      - timestamp
      - repository_tree_hash
      - digest
      - signing_metadata
