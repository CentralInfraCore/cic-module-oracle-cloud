---
name: CI

on:
  push:
    branches:
      - main
      - feat/**
      - fix/**
      - chore/**
  pull_request:
    branches:
      - main

jobs:
  lint_and_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Export host UID/GID for docker compose
        run: |
          echo "UID=$(id -u)" >> "$GITHUB_ENV"
          echo "GID=$(id -g)" >> "$GITHUB_ENV"

      - name: Pre-create bind-mount directories owned by the runner user
        run: mkdir -p p_venv .pip-cache

      - name: Build Docker images
        run: make build

      - name: Start builder container
        run: docker compose up -d builder

      - name: Generate and check requirements.txt for drift
        run: |
          make infra.deps
          git diff --exit-code requirements.txt

      - name: Verify repository manifest
        run: make manifest-verify

      - name: Check internal documentation links
        run: make docs.link-check

      - name: Run code quality checks
        run: make check

      - name: Run Go quality gate (module/)
        run: make golang.quality

      - name: Build WASM guest module (TinyGo)
        run: make wasm.build

      - name: Verify reproducible WASM build (rebuild-verify)
        run: make wasm.rebuild-verify

      - name: Host-load test against the relay cabinet ABI
        run: make wasm.test

      - name: Run tests and generate coverage report
        run: make test

      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v4
        with:
          name: html-coverage-report
          path: htmlcov/
