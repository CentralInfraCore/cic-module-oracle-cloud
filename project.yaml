# abi describes the WASM guest <-> relay host contract (KB c689). It is
# checked against the compiled module/module.wasm exports by
# module/abi_manifest_test.go — a mismatch fails `make wasm.test`.
# See docs/contracts/en/wasm-abi.md for the full contract.
abi:
  name: cic-module-oracle-cloud
  version: "1.0.0"
  envelopeVersion: 1
  # Functions module/module.wasm must export (cicwasm.go:243-247).
  exports:
    - allocate
    - deallocate
    - Call
  # cic:provider ABI op-strings dispatched by module/abi.go's Call
  # (docs/design/specs/provider-abi.md). describe/validate/plan are host-boundary
  # "none"; observe/execute/poll/invoke/destroy are "sign+send".
  operations:
    - describe
    - validate
    - observe
    - plan
    - execute
    - poll
    - invoke
    - destroy
  # Host functions this module REQUIRES for the sign+send ops (observe/execute/
  # poll/invoke/destroy). Declaration only — the module does not define the host
  # side. Names are provisional until settled with the relay (relay-requirements.md
  # R1/R2); today the trust-flow is native-FFI, not a wasm import, so nothing is
  # imported at the wasm level yet. describe() reports this surface.
  imports:
    - module: cic-flow
      functions:
        - sign
        - actuate
# capability_manifest declares what this module needs from the host; the host
# enforces exactly this (relay-requirements.md R3). This is the OCI provisioner's
# target reach — egress to OCI's REST endpoints and a sign-only OCI key handle.
# The module is a scaffold and does not actuate yet; the declaration is the
# contract a reviewer approves. host_functions/limits finalize with the relay
# host surface (R1/R2). See docs/design/specs/capability-manifest.md.
capability_manifest:
  version: v0.1.0
  egress:
    - host: "*.oraclecloud.com"
      methods: [GET, POST, PUT, DELETE, PATCH]
  secrets:
    - handle: "oci/*"
      ops: [sign]
