{
  "type": "object",
  "title": "CIC Provider Module Capability Manifest Schema",
  "description": "Defines the structure of project.yaml's capability_manifest: block -- what a WASM provider module declares it needs, and what the relay host enforces. See docs/design/specs/capability-manifest.md and docs/design/relay-requirements.md (R3: host-side enforcement). NOTE: JSON syntax on purpose -- tools.infra.load_and_resolve_schema resolves project.schema.yaml's $ref to this file via jsonref's default jsonloader, which only accepts JSON. The security model for third-party modules: a module cannot exceed what it declares here, and a reviewer approves the declaration, not the code.",
  "required": ["version", "egress", "secrets"],
  "additionalProperties": false,
  "properties": {
    "version": {
      "type": "string",
      "description": "Semantic version of this manifest's shape (e.g. v0.1.0).",
      "pattern": "^v[0-9]+\\.[0-9]+\\.[0-9]+$"
    },
    "egress": {
      "type": "array",
      "description": "Outbound HTTP the host will permit, enforced by http-executor's EgressPolicy. An empty list means the module makes no outbound calls.",
      "items": {
        "type": "object",
        "required": ["host"],
        "additionalProperties": false,
        "properties": {
          "host": {
            "type": "string",
            "description": "Host or wildcard the module may reach, e.g. '*.oraclecloud.com'."
          },
          "methods": {
            "type": "array",
            "description": "Permitted HTTP methods. Omitted means all.",
            "items": {
              "type": "string",
              "enum": ["GET", "POST", "PUT", "DELETE", "PATCH", "HEAD"]
            }
          },
          "ports": {
            "type": "array",
            "description": "Permitted ports. Omitted means 443.",
            "items": { "type": "integer", "minimum": 1, "maximum": 65535 }
          }
        }
      }
    },
    "secrets": {
      "type": "array",
      "description": "Secret handles the module may sign/read through -- never the secret value itself. An empty list means the module handles no secrets.",
      "items": {
        "type": "object",
        "required": ["handle", "ops"],
        "additionalProperties": false,
        "properties": {
          "handle": {
            "type": "string",
            "description": "Secret handle or wildcard, e.g. 'oci/*'. The value stays in Vault; the module only ever gets a handle."
          },
          "ops": {
            "type": "array",
            "description": "Permitted operations on the handle.",
            "minItems": 1,
            "items": { "type": "string", "enum": ["sign", "read"] }
          }
        }
      }
    },
    "host_functions": {
      "type": "array",
      "description": "Host functions the module imports; must match the abi.imports surface. Names finalize with the relay host surface (relay-requirements.md R1/R2).",
      "items": { "type": "string" }
    },
    "limits": {
      "type": "object",
      "description": "Optional resource limits; host-enforced, defaults apply if omitted.",
      "additionalProperties": false,
      "properties": {
        "max_request_bytes": { "type": "integer", "minimum": 0 },
        "max_response_bytes": { "type": "integer", "minimum": 0 },
        "wall_clock": {
          "type": "string",
          "description": "Duration string, e.g. '60s'.",
          "pattern": "^[0-9]+[smh]$"
        }
      }
    }
  }
}
